<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0a0a"/>

  <!-- ✅ Critical CSS — يمنع الخلفية البيضاء قبل React -->
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background-color: #0a0a0a !important;
      color: #e8e8e8;
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      overflow-x: hidden;
      min-height: 100vh;
    }
    #root {
      background-color: #0a0a0a;
      min-height: 100vh;
    }
    /* Inline loader — يظهر فوراً قبل React */
    #inline-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }
    #inline-loader .logo-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7a5418, #C8973A, #E8B96A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      color: #0a0a0a;
      margin-bottom: 1.5rem;
    }
    #inline-loader .brand {
      color: #C8973A;
      font-family: 'Cairo', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    #inline-loader .sub {
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    #inline-loader .bar-track {
      width: 160px;
      height: 2px;
      background: rgba(200,151,58,0.15);
      border-radius: 999px;
      overflow: hidden;
    }
    #inline-loader .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7a5418, #C8973A, #E8B96A);
      border-radius: 999px;
      animation: barLoad 1.6s ease-in-out forwards;
    }
    @keyframes barLoad {
      0%   { width: 0%; }
      100% { width: 100%; }
    }
    #inline-loader.hide {
      opacity: 0;
      pointer-events: none;
    }
  </style>

  <!-- Primary SEO -->
  <title>خبراء الخزائن | تشكيلات فاخرة من الخزائن والدواليب</title>
  <meta name="description" content="خبراء الخزائن — أرقى تشكيلات الخزائن والدواليب الفاخرة. تصميم مخصص، توصيل وتركيب، ضمان 5 سنوات. الرياض وجدة - المملكة العربية السعودية."/>
  <meta name="keywords" content="خزائن فاخرة, دواليب, خزانة غرفة نوم, خزانة صالون, تصميم مخصص, الرياض, جدة, خبراء الخزائن, luxury wardrobes, cabinets Saudi Arabia"/>
  <meta name="robots" content="index, follow"/>
  <meta name="author" content="خبراء الخزائن"/>
  <link rel="canonical" href="https://khobara-khazaen.com/"/>

  <!-- Open Graph -->
  <meta property="og:type"         content="website"/>
  <meta property="og:site_name"    content="خبراء الخزائن"/>

  <meta property="og:image"        content="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=1200&h=630&fit=crop"/>
  <meta property="og:image:width"  content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:locale"       content="ar_SA"/>
  <meta property="og:locale:alternate" content="en_US"/>

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image"/>

</head>
<body>

  <!-- ✅ Inline loader — يظهر فوراً بدون انتظار JavaScript -->
  <div id="inline-loader">
    <div class="logo-ring">خ</div>
    <div class="brand">خبراء الخزائن</div>
    <div class="sub">Khobara Khazaen</div>
    <div class="bar-track">
      <div class="bar-fill"></div>
    </div>
  </div>

  <div id="root"></div>

  <!-- ✅ يخفي الـ inline loader بعد ما React يحمّل -->
  <script>
    window.__hideInlineLoader = function() {
      var el = document.getElementById('inline-loader');
      if (el) {
        el.classList.add('hide');
        setTimeout(function() { el.remove(); }, 450);
      }
    };
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
